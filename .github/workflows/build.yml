name: Firmware Build

# Only included into other workflows
on:
  workflow_dispatch:
  workflow_call:

jobs: # Based off WLED Build scripts: https://github.com/wled/WLED/blob/b60313e1f884e129197a7e08d8c669593fae01d3/.github/workflows/build.yml
  get_default_envs:
    name: Gather Environments
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Install PlatformIO
      run: pip install -r requirements.txt
    - name: Get default environments
      id: envs
      run: |
        python - <<'PY' > /tmp/envs.json
        import configparser, json
        cfg = configparser.ConfigParser()
        cfg.optionxform = str
        cfg.read('platformio.ini')
        envs = [s.split(':',1)[1] for s in cfg.sections() if s.startswith('env:')]
        print(json.dumps(envs))
        PY
        echo "environments=$(cat /tmp/envs.json)" >> $GITHUB_OUTPUT
    outputs:
      environments: ${{ steps.envs.outputs.environments }}

  build:
    name: Build Environments
    runs-on: ubuntu-latest
    needs: get_default_envs
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJSON(needs.get_default_envs.outputs.environments) }}
    steps:
    - uses: actions/checkout@v4

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: |
              ~/.platformio/.cache
              ~/.buildcache
              build_output
        key: pio-${{ runner.os }}-${{ matrix.environment }}-${{ hashFiles('platformio.ini', 'pio-scripts/output_bins.py') }}-${{ hashFiles('wled00/**', 'usermods/**') }}
        restore-keys: pio-${{ runner.os }}-${{ matrix.environment }}-${{ hashFiles('platformio.ini', 'pio-scripts/output_bins.py') }}-
          
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
          python-version: '3.12'
          cache: 'pip'

    - name: Install PlatformIO
      run: pip install -r requirements.txt

    - name: Build firmware
      run: pio run -e ${{ matrix.environment }}

    - name: Prepare firmware files
      run: |
        mkdir -p build_output/release
        cp .pio/build/${{ matrix.environment }}/firmware.bin build_output/release/haptics_${{ matrix.environment }}.bin

    - uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.environment }}

        path: |
          build_output/release/*.bin
          build_output/merged/*.bin